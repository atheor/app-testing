# SQS Consumer Lambda — Spring Boot configuration
# All sensitive values must be supplied via Lambda environment variables.

# ------------------------------------------------------------------
# Database (PostgreSQL)
# ------------------------------------------------------------------
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/atheor}
spring.datasource.username=${DB_USERNAME:atheor}
spring.datasource.password=${DB_PASSWORD:atheor123}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP — keep pool small; Lambda is single-threaded per instance
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway — run migrations (schema already in app-testing-backend, reused here)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ------------------------------------------------------------------
# AWS
# ------------------------------------------------------------------
aws.region=${AWS_REGION:us-east-1}
aws.sns.topic.arn=${SNS_TOPIC_ARN:}
aws.sns.endpoint=${SNS_ENDPOINT:}

# ------------------------------------------------------------------
# Lambda cold-start optimisations
# ------------------------------------------------------------------
spring.main.lazy-initialization=true
spring.main.banner-mode=off
