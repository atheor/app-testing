# -------------------------------------------------------
# Browser configuration
# -------------------------------------------------------
# Supported values: chrome, edge
browser=chrome

# Run browser in headless mode (true = headless, false = visible)
browser.headless=false

# Explicit wait timeout in seconds
wait.timeout.seconds=10

# -------------------------------------------------------
# SauceDemo
# -------------------------------------------------------
saucedemo.base.url=https://www.saucedemo.com
saucedemo.username=standard_user
saucedemo.password=secret_sauce

# -------------------------------------------------------
# CountryInfoService (SOAP)
# -------------------------------------------------------
countryinfo.endpoint=http://webservices.oorsprong.org/websamples.countryinfo/CountryInfoService.wso

# -------------------------------------------------------
# REST Assured
# -------------------------------------------------------
rest.base.uri=
rest.logging.enabled=false

# -------------------------------------------------------
# Inbound Lambda SOAP endpoint
# Set to the full API Gateway URL including the resource path.
#
# LocalStack example:
#   inbound.endpoint=http://localhost:4566/restapis/{api-id}/local/_user_request_/soap/schedule
# AWS example:
#   inbound.endpoint=https://{api-id}.execute-api.us-east-1.amazonaws.com/prod/soap/schedule
# -------------------------------------------------------
inbound.endpoint=http://your-api-gateway-endpoint/soap/schedule
